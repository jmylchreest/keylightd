name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "cmd/keylight-openapi/**"
      - "internal/http/routes/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate OpenAPI spec
        run: |
          go run ./cmd/keylight-openapi -yaml -output docs/static/openapi.yaml
          go run ./cmd/keylight-openapi -output docs/static/openapi.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Generate OpenAPI docs
        working-directory: docs
        run: npx docusaurus gen-api-docs keylightd

      - name: Build documentation
        working-directory: docs
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/build

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # Clean up the github-pages artifact after deployment to minimize
  # Actions storage billing.
  cleanup-artifacts:
    name: Clean up build artifacts
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Delete all workflow run artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: github-pages
          failOnError: false
